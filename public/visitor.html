<h2>Visitor Logs</h2>
<div id="visitorList"></div>

<script>
async function loadVisitors() {
  try {
    const res = await fetch('http://localhost:3000/visitors');
    const data = await res.json();

    const container = document.getElementById("visitorList");
    container.innerHTML = "";

    if (data.length === 0) {
      container.innerHTML = "No visitors found";
      return;
    }

    data.forEach(v => {
      container.innerHTML += `
        <div style="background:#374151;padding:10px;margin:10px;border-radius:5px;">
          <p><b>Name:</b> ${v.name}</p>
          <p><b>Flat:</b> ${v.flat_number}</p>
          <p><b>Purpose:</b> ${v.purpose}</p>
          <p><b>Time:</b> ${v.entry_time}</p>
        </div>
      `;
    });

  } catch (err) {
    console.error(err);
    document.getElementById("visitorList").innerHTML =
      "❌ Failed to load visitors";
  }
}

loadVisitors();
</script>
