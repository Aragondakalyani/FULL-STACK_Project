<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secretary Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Secretary Dashboard</h1>

<!-- Complaints -->
<h2>Complaints</h2>
<div id="complaintsList">Loading...</div>
<button onclick="clearComplaints()">Clear Complaints</button>

<!-- Notifications -->
<h2>Send Notification</h2>
<textarea id="eventMessage" placeholder="Enter message"></textarea><br>
<button onclick="sendNotification()">Send</button>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const user = JSON.parse(localStorage.getItem("user"));
  if (!user || user.role.toLowerCase() !== "secretary") {
    alert("Only secretaries allowed");
    window.location.href = "login.html";
    return;
  }

  // ✅ CORRECT API
  fetch("http://localhost:3000/get-complaints")
    .then(res => res.json())
    .then(data => {
      const div = document.getElementById("complaintsList");

      if (data.length === 0) {
        div.innerHTML = "No complaints available";
        return;
      }

      div.innerHTML = "";

      data.forEach((c, i) => {
        const p = document.createElement("p");
        p.textContent = `${i + 1}. Flat ${c.flat_number} - ${c.complaint_text}`;
        div.appendChild(p);
      });
    })
    .catch(err => {
      console.error(err);
      alert("❌ Failed to load complaints");
    });
});

// ✅ CLEAR COMPLAINTS
function clearComplaints() {
  fetch("http://localhost:3000/clear-complaints", {
    method: "DELETE"
  })
  .then(res => res.text())
  .then(msg => {
    alert(msg);
    document.getElementById("complaintsList").innerHTML = "No complaints available";
  })
  .catch(err => {
    console.error(err);
    alert("❌ Failed to clear complaints");
  });
}

// ✅ SEND NOTIFICATION
function sendNotification() {
  const message = document.getElementById("eventMessage").value;

  fetch("http://localhost:3000/add-notification", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message })
  })
  .then(res => res.text())
  .then(msg => {
    alert(msg);
    document.getElementById("eventMessage").value = "";
  })
  .catch(err => {
    console.error(err);
    alert("❌ Failed to send notification");
  });
}
</script>

</body>
</html>
