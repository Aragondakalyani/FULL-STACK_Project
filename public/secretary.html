<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secretary Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        h1, h2 {
            color: black;
        }
    </style>
</head>
<body>

    <h1>Secretary Dashboard</h1>

    <!-- Complaints Section -->
    <h1 style="color:rgb(255, 255, 255);">Complaints</h1>
    <div id="complaintsList" style="background-color: rgba(23, 19, 19, 0.861); padding: 8px; border-radius: 5px; box-shadow: 0px 0px 5px white;margin:100px;color:white">No complaints available</div>
    <button onclick="clearComplaints()">Clear Complaints</button>

    <!-- Notifications & Events Section -->
    <h2 style="color:rgb(255, 255, 255);">Send Notifications & Events</h2>
    <textarea id="eventMessage" placeholder="Enter notification/event details"></textarea>
    <button onclick="sendNotification()">Send Notification</button>
    <div id="sentNotifications"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
          const user = JSON.parse(localStorage.getItem("user"));
          if (!user || user.role.toLowerCase() !== "secretary") {
            alert("Only secretaries can view this page!");
            window.location.href = "login.html";
            return;
          }
      
          fetch("/view-complaints", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_id: user.user_id }),
          })
            .then((res) => res.json())
            .then((complaints) => {
              let complaintsDiv = document.getElementById("complaintsList");
      
              if (complaints.length === 0) {
                complaintsDiv.innerHTML = "No complaints available.";
                return;
              }
      
              complaintsDiv.innerHTML = "";
              complaints.forEach((complaint, index) => {
                const { flat_number, complaint_text, date } = complaint;
      
                const complaintItem = document.createElement("p");
                complaintItem.innerText = `${index + 1}. [Flat ${flat_number}] ${complaint_text} (Date: ${date})`;
                complaintsDiv.appendChild(complaintItem);
              });
            })
            .catch((err) => {
              console.error("Error fetching complaints:", err);
              alert("❌ Failed to load complaints.");
            });
        });
      
        function clearComplaints() {
  const user = JSON.parse(localStorage.getItem("user"));
  if (!user || user.role.toLowerCase() !== "secretary") {
    alert("Unauthorized");
    return;
  }

  if (!confirm("Are you sure you want to delete all complaints? This action cannot be undone.")) {
    return;
  }

  fetch("/clear-complaints", {
    method: "DELETE",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ user_id: user.user_id })
  })
    .then(res => res.text())
    .then(msg => {
      alert(msg);
      document.getElementById("complaintsList").innerHTML = "No complaints available.";
    })
    .catch(err => {
      console.error("Clear error:", err);
      alert("❌ Failed to clear complaints");
    });
}

      
function sendNotification() {
  let message = document.getElementById("eventMessage").value.trim();
  if (message === "") {
    alert("Please enter a notification/event message!");
    return;
  }

  fetch('/send-event', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ description: message })
  })
    .then(res => res.text())
    .then(response => {
      alert(response);
      document.getElementById("eventMessage").value = "";
    })
    .catch(err => {
      console.error("Error sending event:", err);
      alert("❌ Failed to send notification/event");
    });
}

      </script>
      
</body>
</html>
