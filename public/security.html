<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Visitor Entry</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-image: url('background.jpg'); /* Change to your preferred background */
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
        }
        .container {
            margin-top: 100px;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            display: inline-block;
            border-radius: 10px;
            
        }
        input, button {
            margin: 10px;
            padding: 10px;
            font-size: 16px;
            width: 250px;
            border-radius: 5px;
            border: none;
        }
        button {
            background-color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: lightgray;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Security - Visitor Entry</h1>
        <input type="text" id="visitorName" placeholder="Visitor's Name">
        <input type="text" id="visitPurpose" placeholder="Purpose of Visit">
        <input type="text" id="flatNumber" placeholder="Flat Number">
        <button id="submitVisitor">Submit</button>
    </div>

    <script>
        document.getElementById("submitVisitor").addEventListener("click", function () {
  let visitorName = document.getElementById("visitorName").value;
  let visitPurpose = document.getElementById("visitPurpose").value;
  let flatNumber = document.getElementById("flatNumber").value;

  if (visitorName === "" || visitPurpose === "" || flatNumber === "") {
    alert("Please fill in all details.");
    return;
  }

  fetch('/submit-visitor', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      name: visitorName,
      purpose: visitPurpose,
      flat_number: flatNumber
    })
  })
    .then(res => res.text())
    .then(msg => {
      alert(msg);
      document.getElementById("visitorName").value = "";
      document.getElementById("visitPurpose").value = "";
      document.getElementById("flatNumber").value = "";
    })
    .catch(err => {
      console.error("❌ Error submitting visitor:", err);
      alert("❌ Failed to submit visitor entry.");
    });
});

      </script>
      

</body>
</html>
