<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Visitor Entry</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-image: url('background.jpg'); /* Change to your preferred background */
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
        }
        .container {
            margin-top: 100px;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            display: inline-block;
            border-radius: 10px;
            
        }
        input, button {
            margin: 10px;
            padding: 10px;
            font-size: 16px;
            width: 250px;
            border-radius: 5px;
            border: none;
        }
        button {
            background-color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: lightgray;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Security - Visitor Entry</h1>
        <input type="text" id="visitorName" placeholder="Visitor's Name">
        <input type="text" id="visitPurpose" placeholder="Purpose of Visit">
        <input type="text" id="flatNumber" placeholder="Flat Number">
        <button id="submitVisitor">Submit</button>
    </div>

    <script>
document.getElementById("submitVisitor").addEventListener("click", async function () {

  const visitorName = document.getElementById("visitorName").value.trim();
  const visitPurpose = document.getElementById("visitPurpose").value.trim();
  const flatNumber = document.getElementById("flatNumber").value.trim();

  if (!visitorName || !visitPurpose || !flatNumber) {
    alert("Please fill all fields");
    return;
  }

  try {
    const response = await fetch("http://localhost:3000/add-visitor", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: visitorName,
        phone: "N/A",
        flat_number: flatNumber,
        purpose: visitPurpose
      })
    });

    const text = await response.text();

    alert(text);

    if (response.ok) {
      document.getElementById("visitorName").value = "";
      document.getElementById("visitPurpose").value = "";
      document.getElementById("flatNumber").value = "";
    }

  } catch (error) {
    console.error("ERROR:", error);
    alert("❌ Server not responding. Check backend.");
  }
<button id="submitVisitor">Submit</button>
});
</script>
</body>
</html>
