<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complaints</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background-color: #333;
      color: white;
    }
    textarea {
      width: 80%;
      height: 200px;
      padding: 15px;
      font-size: 16px;
      background-color: #555;
      color: white;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .dashboard-btn {
      background-color: #4CAF50;
      color: white;
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 5px;
      margin-top: 20px;
      cursor: pointer;
    }
    .dashboard-btn:hover {
      background-color: #358439;
    }
  </style>
</head>
<body>

  <h1>Complaints & Feedback</h1>
  <textarea id="complaint_text" placeholder="Type your complaint here..."></textarea><br>
  <button class="dashboard-btn" onclick="submitComplaint()">Submit</button>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const user = JSON.parse(localStorage.getItem("user"));
      if (!user || !user.user_id) {
        alert("⚠️ Please log in to submit complaints.");
        window.location.href = "login.html"; // redirect to login page if not logged in
      }
    });

    function submitComplaint() {
      const complaint_text = document.getElementById("complaint_text").value.trim();
      const user = JSON.parse(localStorage.getItem("user"));
      const user_id = user?.user_id;

      if (!complaint_text) {
        alert("Please enter a complaint before submitting!");
        return;
      }

      fetch('/submit-complaint', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id, complaint_text })
      })
      .then(res => res.text())
      .then(message => {
        alert(message);
        document.getElementById("complaint_text").value = "";
      })
      .catch(err => {
        console.error("Error:", err);
        alert("❌ Failed to submit complaint.");
      });
    }
  </script>

</body>
</html>
