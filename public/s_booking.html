<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Saloon Booking</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="booking-box">

  <h2>Saloon Booking</h2>
  <p>Select a time slot and enter your flat number to confirm your booking.</p>

  <label for="date">Select Date:</label>
  <input type="date" id="date" required /><br><br>

  <label for="timeSlot">Select Time:</label>
  <select id="timeSlot">
    <option value="">Select Time</option>
    <option value="6AM-7AM">6:00 AM - 7:00 AM</option>
    <option value="7AM-8AM">7:00 AM - 8:00 AM</option>
    <option value="8AM-9AM">8:00 AM - 9:00 AM</option>
    <option value="9AM-10AM">9:00 AM - 10:00 AM</option>
    <option value="5PM-6PM">5:00 PM - 6:00 PM</option>
    <option value="6PM-7PM">6:00 PM - 7:00 PM</option>
  </select><br><br>

  <label for="service">Enter Service:</label>
  <input type="text" id="service" placeholder="e.g., Haircut, Facial"><br><br>

  <label for="flatNumber">Flat Number:</label>
  <input type="text" id="flatNumber" readonly><br><br>

  <button class="confirm-btn" onclick="bookSaloon()">Confirm Booking</button>
  <button class="back-btn" onclick="goBack()">Back</button>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const user = JSON.parse(localStorage.getItem("user"));
      if (user && user.flat_number) {
        document.getElementById("flatNumber").value = user.flat_number;
      }
    });

    function bookSaloon() {
  const date = document.getElementById("date").value;
  const time = document.getElementById("timeSlot").value;
  const flat = document.getElementById("flatNumber").value;
  const service = document.getElementById("service").value;

  const user = JSON.parse(localStorage.getItem("user"));
  const user_id = user?.user_id;

  if (!date || !time || !flat || !service || !user_id) {
    alert("Please fill in all fields.");
    return;
  }

  // Convert "8AM-9AM" → "08:00:00"
  const timeMap = {
    "6AM-7AM": "06:00:00",
    "7AM-8AM": "07:00:00",
    "8AM-9AM": "08:00:00",
    "9AM-10AM": "09:00:00",
    "5PM-6PM": "17:00:00",
    "6PM-7PM": "18:00:00"
  };

  const formattedTime = timeMap[time];
  if (!formattedTime) {
    alert("Invalid time selected.");
    return;
  }

  const timestamp = `${date} ${formattedTime}`; // Format: YYYY-MM-DD HH:MM:SS

  fetch('/book-saloon', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      user_id,
      flat_number: flat,
      service,
      booking_time: timestamp
    })
  })
    .then(res => res.text())
    .then(msg => alert(msg))
    .catch(err => {
      console.error('Booking failed:', err);
      alert("❌ Failed to book saloon appointment.");
    });
}


    function goBack() {
      window.location.href = "facilities.html";
    }
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background-color: #333;
      color: white;
    }
    select, input {
      padding: 10px;
      font-size: 16px;
      margin: 10px;
      width: 250px;
    }
    .confirm-btn, .back-btn {
      background-color: #4CAF50;
      color: white;
      padding: 15px 20px;
      margin: 10px;
      border: none;
      cursor: pointer;
      font-size: 18px;
      border-radius: 5px;
    }
    .confirm-btn:hover, .back-btn:hover {
      background-color: #358439;
    }
  </style>

</body>
</html>
