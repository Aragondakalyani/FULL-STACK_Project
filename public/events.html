<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Events & Notifications</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #1f2937;
    color: white;
}

h1 {
    margin-top: 30px;
}

.section {
    margin: 40px auto;
    width: 60%;
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 10px;
}

.event-card {
    background: #374151;
    margin: 10px;
    padding: 15px;
    border-radius: 8px;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    background: #ef4444;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
</style>

</head>
<body>

<h1>Events & Notifications</h1>

<!-- EVENTS -->
<div class="section">
    <h2>Upcoming Events</h2>
    <div id="eventsContainer">Loading...</div>
</div>

<!-- NOTIFICATIONS -->
<div class="section">
    <h2>Notifications</h2>
    <div id="notificationsList">Loading...</div>
    <button onclick="clearNotifications()">Clear Notifications</button>
</div>

<script>
// ================= LOAD EVENTS =================
async function loadEvents() {
    try {
        const res = await fetch('http://localhost:3000/events');
        const data = await res.json();

        const container = document.getElementById("eventsContainer");
        container.innerHTML = "";

        if (data.length === 0) {
            container.innerHTML = "No events available";
            return;
        }

        data.forEach(e => {
            container.innerHTML += `
                <div class="event-card">
                    <h3>${e.title}</h3>
                    <p>${e.description || ""}</p>
                    <small>${e.event_date}</small>
                </div>
            `;
        });

    } catch (err) {
        console.error(err);
        document.getElementById("eventsContainer").innerHTML =
            "❌ Failed to load events";
    }
}

// ================= LOAD NOTIFICATIONS =================
async function loadNotifications() {
    try {
        const res = await fetch('http://localhost:3000/notifications');
        const data = await res.json();

        const container = document.getElementById("notificationsList");
        container.innerHTML = "";

        if (data.length === 0) {
            container.innerHTML = "No notifications available";
            return;
        }

        data.forEach(n => {
            container.innerHTML += `<p>🔔 ${n.message}</p>`;
        });

    } catch (err) {
        console.error(err);
        document.getElementById("notificationsList").innerHTML =
            "❌ Failed to load notifications";
    }
}

// ================= CLEAR NOTIFICATIONS =================
async function clearNotifications() {
    if (!confirm("Clear all notifications?")) return;

    try {
        await fetch('http://localhost:3000/clear-notifications', {
            method: 'DELETE'
        });

        alert("Cleared!");
        loadNotifications();

    } catch (err) {
        console.error(err);
        alert("❌ Failed to clear");
    }
}

// ================= LOAD ALL =================
loadEvents();
loadNotifications();

</script>

</body>
</html>
