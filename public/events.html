<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events & Notifications</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Events & Notifications</h1>

    <!-- Events & Notifications Section -->
    <h2>Latest Notifications from Secretary</h2>
    <div id="notificationsList" style="background-color: rgba(0, 0, 0, 0.603); padding: 10px; border-radius: 5px; box-shadow: 0px 0px 5px rgba(0,0,0,0.1); margin: 100px 300px;">No notifications available</div>
    <button onclick="clearNotifications()">Clear Notifications</button>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
          fetch('/get-events')
            .then((res) => res.json())
            .then((events) => {
              let eventsDiv = document.getElementById("notificationsList");
      
              if (events.length === 0) {
                eventsDiv.innerHTML = "No notifications available.";
                return;
              }
      
              eventsDiv.innerHTML = "";
              events.forEach((event, index) => {
                const eventItem = document.createElement("p");
                eventItem.innerText = `${index + 1}. ${event.description}`;
                eventsDiv.appendChild(eventItem);
              });
            })
            .catch((err) => {
              console.error("Error fetching events:", err);
              document.getElementById("notificationsList").innerHTML =
                "❌ Failed to load events.";
            });
        });
      
        // Optional: Add button to clear notifications table if needed (admin only)
        function clearNotifications() {
          if (!confirm("Are you sure you want to clear all notifications?"))
           return;
      
          fetch("/clear-events", {
            method: "DELETE",
          })
            .then((res) => res.text())
            .then((msg) => {
              alert(msg);
              document.getElementById("notificationsList").innerHTML =
                "No notifications available.";
            })
            .catch((err) => {
              console.error("Clear notifications error:", err);
              alert("❌ Failed to clear notifications.");
            });
        }
      </script>
      
</body>
</html>
