<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Menu</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
      text-align: center;
      font-family: Arial, sans-serif;
      margin-top: 100px;
      background-image: url('c.jpg'); 
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: white;
    }

    #menuContainer img {
      width: 80%;
      max-width: 500px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
    </style>
    
</head>
<body>
    

    <h1>Cafe Menu</h1>
    <div id="menuContainer"></div>
    

    <script>
        // Get the latest uploaded menu image from localStorage
        const menuImage = localStorage.getItem("menuImage");
        const container = document.getElementById("menuContainer");

        if (menuImage) {
            const img = document.createElement("img");
            img.src = menuImage;
            img.alt = "Cafe Menu";
            container.appendChild(img);
        } else {
            container.innerHTML = "<p>No menu uploaded yet.</p>";
        }
    </script>

</body>
</html>
