<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cafe Owner - Upload Menu</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      margin: 0;
      padding-top: 100px;
      background-image: url('c.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      color: white;
    }

    input, button {
      margin: 10px;
      padding: 10px;
      font-size: 16px;
    }

    img {
      margin-top: 20px;
      width: 200px;
      border-radius: 8px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>
  <h1>Upload Today's Cafe Menu</h1>
  <input type="file" id="menuUpload" accept="image/*"><br>
  <button onclick="uploadMenu()">Submit Menu</button>

  <script>
    function uploadMenu() {
      const fileInput = document.getElementById('menuUpload');
      const file = fileInput.files[0];

      if (!file) {
        alert("Please select a menu image first.");
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        localStorage.setItem("menuImage", e.target.result);
        alert("Menu uploaded successfully!");
        fileInput.value = "";
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
